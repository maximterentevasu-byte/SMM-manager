version: "3.9"

services:

  # --- База данных ---
  postgres:
    image: postgres:16-alpine
    container_name: smm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smm_platform
      POSTGRES_USER: smm_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smm_user -d smm_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Кэш и брокер задач ---
  redis:
    image: redis:7-alpine
    container_name: smm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Бэкенд API ---
  backend:
    build: ./backend
    container_name: smm_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Воркер фоновых задач ---
  celery_worker:
    build: ./backend
    container_name: smm_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q celery,default,generation,posting
  # --- Планировщик задач (постинг по расписанию) ---
  celery_beat:
    build: ./backend
    container_name: smm_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  # --- Мониторинг задач (веб-интерфейс) ---
  flower:
    image: mher/flower:2.0
    container_name: smm_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
